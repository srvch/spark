server:
  port: ${PORT:8080}

spring:
  application:
    name: spark-backend
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/spark}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info

spark:
  live:
    ttl-seconds: ${SPARK_TTL_SECONDS:86400}
    geo-key: sparks:geo
  auth:
    jwt-secret: ${SPARK_JWT_SECRET:change-this-super-secret-key-change-this-super-secret-key}
    jwt-expiry-seconds: ${SPARK_JWT_EXPIRY_SECONDS:2592000}
    otp-ttl-seconds: ${SPARK_OTP_TTL_SECONDS:180}
    expose-debug-otp: ${SPARK_AUTH_EXPOSE_DEBUG_OTP:false}
    enable-dev-guest-login: ${SPARK_AUTH_ENABLE_DEV_GUEST_LOGIN:true}
  push:
    enabled: ${SPARK_PUSH_ENABLED:false}
    credentials-path: ${SPARK_PUSH_CREDENTIALS_PATH:}
  ai:
    enabled: ${SPARK_AI_ENABLED:true}
    provider: ${SPARK_AI_PROVIDER:gemini}
    model: ${SPARK_AI_MODEL:gemini-2.5-flash-lite}
    gemini-api-key: ${SPARK_AI_GEMINI_API_KEY:}
    timeout-millis: ${SPARK_AI_TIMEOUT_MILLIS:4000}
