name: spark_flutter
description: "Spark – discover and join spontaneous local events happening right now."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  dio: ^5.9.0
  url_launcher: ^6.3.2
  share_plus: ^10.0.2
  app_links: ^6.3.4
  firebase_core: ^3.15.0
  firebase_messaging: ^15.1.3
  geolocator: ^13.0.2
  geocoding: ^4.0.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  qr_flutter: ^4.1.0
  flutter_contacts: ^1.1.9+2
  firebase_auth: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
