<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark | Find Your Spark</title>
    <meta name="description" content="Discover activities, sports, and connect with people near you.">
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF5E3A; /* Vibrant Spark Orange */
            --primary-gradient: linear-gradient(135deg, #FF5E3A 0%, #FF2A68 100%);
            --dark-bg: #0A0B0D;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
        }

        /* --- Background Decoration --- */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,94,58,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            border-radius: 50%;
        }
        .glow-1 { top: -200px; right: -100px; }
        .glow-2 { bottom: -200px; left: -100px; }

        /* --- Layout --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(255, 94, 58, 0.3);
        }

        .logo-text {
            font-size: 24px;
            letter-spacing: 2px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* --- Hero Section --- */
        .hero {
            padding: 80px 0 120px;
            text-align: center;
        }

        .hero h1 {
            font-size: 72px;
            line-height: 1.1;
            margin-bottom: 24px;
            background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 20px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 48px;
        }

        /* --- App Buttons --- */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 32px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: #fff;
            box-shadow: 0 10px 30px rgba(255, 94, 58, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 94, 58, 0.5);
        }

        .btn-secondary {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: #fff;
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
        }

        /* --- Feature Preview --- */
        .mockup-container {
            position: relative;
            margin-top: 80px;
            perspective: 1000px;
        }

        .mockup-img {
            width: 100%;
            max-width: 900px;
            height: auto;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            transition: transform 0.5s ease;
        }

        .mockup-container:hover .mockup-img {
            transform: rotateX(5deg);
        }

        /* --- Footer --- */
        footer {
            padding: 60px 0;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            margin-top: 100px;
        }

        .footer-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .contact-link {
            color: var(--primary);
            text-decoration: none;
            margin-top: 12px;
            display: block;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 48px; }
            .hero p { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="container">
        <header>
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="white" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="logo-text">Spark</div>
            </div>
        </header>

        <main class="hero">
            <h1>Find Your Spark.</h1>
            <p>The social home for sports, study groups, and local activities. Connect with people who share your passions, in person.</p>
            
            <div class="btn-group">
                <a href="#" class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 17.5c-1.2 1.2-2.8 1.8-4.5 1.8-3.5 0-6.3-2.8-6.3-6.3s2.8-6.3 6.3-6.3c1.7 0 3.3.7 4.5 1.8l2.2-2.2c-1.7-1.7-4-2.8-6.7-2.8-5.2 0-9.5 4.3-9.5 9.5s4.3 9.5 9.5 9.5c2.7 0 5-1.1 6.7-2.8l-2.2-2.2zM21 11h-8v2h8v-2z"/></svg>
                    Download on iOS
                </a>
                <a href="#" class="btn btn-secondary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 12l-7.5-7.5v15l7.5-7.5z"/></svg>
                    Get it on Android
                </a>
            </div>

            <div class="mockup-container">
                <img src="mockup.png" alt="Spark App UI" class="mockup-img">
            </div>
        </main>

        <footer>
            <p class="footer-text">© 2026 Spark Social. All rights reserved.</p>
            <a href="mailto:feedback@thesparkapp.io" class="contact-link">feedback@thesparkapp.io</a>
        </footer>
    </div>
</body>
</html>
